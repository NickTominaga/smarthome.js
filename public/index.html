<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nature Remo Web Controller</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        main {
            max-width: 920px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 8px;
        }

        .spinner-container {
            position: relative;
            min-height: 120px;
        }

        .overlay-spinner {
            display: none;
            position: absolute;
            inset: 0;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.7);
            z-index: 10;
        }

        .overlay-spinner.loading {
            display: flex;
        }

        .appliance-card + .appliance-card {
            margin-top: 12px;
        }
    </style>
</head>

<body>
    <main>
        <h1>Nature Remo Web Controller</h1>
        <p>Nature Remo に接続された家電をWebブラウザから操作するためのページです。</p>

        <div class="mb-3 d-grid gap-2">
            <p class="mb-0">
                <a href="https://home.nature.global/" target="_blank" rel="noopener noreferrer">home.nature.global</a>で作成した
                Nature API Access token を下に貼り付けてください。ただし、<b>共有PC</b>で使用した後は必ずクリアしておいてください（ブラウザに残っていると、他人に家電を操作されてしまいます）。
            </p>
            <label class="form-label" for="apiAccessToken">Nature API Access token</label>
            <input id="apiAccessToken" class="form-control" type="password"
                placeholder="home.nature.global で作成した Nature API Access token を貼り付けてください">
            <button id="clearTokenBtn" class="btn btn-outline-secondary btn-sm align-self-start" type="button">トークンをクリア</button>

            <p class="mb-0">エアコン・床暖・照明・TV・登録済みシグナルを含め、取得できる操作をすべて表示します。</p>

        </div>
        <div class="spinner-container">
            <div class="mb-3">
                <button id="scanBtn" class="btn btn-primary" type="button">家電をスキャン</button>
            </div>

            <div id="userInfo" class="fw-bold mb-2">
            </div>
            <div id="appliancesList" class="outputs">
            </div>

            <div id="alert" class="alert alert-danger alert-dismissible fade" role="alert">
                <strong>エラー</strong>
                <div id="alertMsg"></div>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div id="spinner" class="overlay-spinner">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script type="module" src="./main.js"></script>
</body>

</html>
